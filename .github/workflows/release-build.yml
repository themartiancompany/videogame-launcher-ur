name:
  release-build
run-name:
  Releases Life and DogeOS packages.
permissions:
  contents:
    write
on:
  release:
    types:
      [published]

jobs:
  # This is what is currently necessary to make termux-docker work with GHA.
  termux_release:
    name:
      Life and DogeOS Android base (Termux) binary packages.
    strategy:
      matrix:
        include:
          # - runner:
          #     ubuntu-24.04-arm
          #   platform:
          #     android
          #   platform_target:
          #     termux
          #   architecture:
          #     aarch64
          # - runner:
          #     ubuntu-24.04
          #   platform:
          #     android
          #   platform_target:
          #     termux
          #   architecture:
          #     i686
          # - runner:
          #     ubuntu-24.04-armv7l
          #   platform:
          #     android
          #   platform_target:
          #     termux
          #   architecture:
          #     armv7l
          - runner:
              ubuntu-24.04
            platform:
              android
            platform_target:
              termux
            architecture:
              x86_64
    runs-on:
      ${{ matrix.runner }}
    # prepare writable volume prefix mount for actions/upload-artifact,
    # based on the higher-profile workaround for 32-bit GNU/Linux containers explained here
    # https://github.com/actions/upload-artifact/issues/616#issuecomment-2350667347
    container:
      image:
        termux/termux-docker:${{ matrix.architecture }}
      volumes: 
        - /tmp/node20:/__e/node20
    # approximate environment variables for actions that can't be forced to use entrypoint.sh
    env:
      GH_TOKEN:
        ${{ secrets.GITHUB_TOKEN }}
      TERMUX_MAIN_PACKAGE_FORMAT:
        debian
      TERMUX_VERSION:
          50
      ANDROID_ROOT:
        /system
      ANDROID_DATA:
        /data
      PREFIX:
        /data/data/com.termux/files/usr
      HOME:
        /data/data/com.termux/files/home
      PATH:
        /data/data/com.termux/files/usr/bin
      TMPDIR:
        /data/data/com.termux/files/usr/tmp
      LANG:
        en_US.UTF-8
      TZ:
        UTC
    steps:
      - name:
          Set 'pkg' command to use the packages-cf.termux.dev mirror.
        run: |
          ln \
            -sf \
            "${PREFIX}/etc/termux/mirrors/default" \
            "${PREFIX}/etc/termux/chosen_mirrors"
      - name:
          Upgrade Termux debian environment.
        run: |
          /entrypoint.sh \
            bash \
              -c \
                "yes | pkg upgrade -y"
      # actions/checkout will "think" that termux's tar binary isn't executable if it doesn't have
      # executable bit actually set for all users, since even though that permissions restriction
      # doesn't actually apply to the root user (at least on Android), GitHub Actions' internal
      # source code doesn't "care" and would refuse to run the binary anyway.
      # relevant internal source code of GitHub Actions:
      # https://github.com/actions/toolkit/blob/930c89072712a3aac52d74b23338f00bb0cfcb24/packages/io/src/io-util.ts#L167-L177
      - name:
          Fixes executable bit for all binaries in "${PREFIX}/bin" for all users.
        run: |
          chmod \
            -R \
            "o+x" \
            "${PREFIX}/bin"
      - name:
          Installs bionic-libc NodeJS to force compatibility with actions/checkout and actions/upload-artifact.
        run: |
          /entrypoint.sh \
            pkg \
              install \
                -y \
                "nodejs-lts"
          ln \
            -sf \
            "${PREFIX}/bin" \
            "/__e/node20/bin"
      - uses:
          actions/checkout@v4.2.2
      - name:
          Fixes permissions of repository after actions/checkout, which ran as root user, while entrypoint.sh activates system user (1000).
        run: |
          chown \
            -R \
            "1000:1000" \
            "${PWD}"
      - name:
          Setup user's home.
        run: |
          # Setup home
          /entrypoint.sh \
            mkdir \
              -p \
              "${HOME}"
      - name:
          Installs Python.
        run: |
          /entrypoint.sh \
            pkg \
              install \
                -y \
                "python"
          /entrypoint.sh \
            pkg \
              install \
                -y \
                "python-pip"
          /entrypoint.sh \
            pip \
              install \
                "build"
          /entrypoint.sh \
            pip \
              install \
                "installer"
          /entrypoint.sh \
            pip \
              install \
                "flit-core"
      # - name:
      #     Installs Rust.
      #   run: |
      #     env 
      #       _arch="$( \
      #         uname \
      #           -m)" \
      #       export \
      #         _arch="$( \
      #           uname \
      #             -m)" && \
      #       /entrypoint.sh \
      #         echo \
      #           "Architecture: ${_arch}" && \
      #         if [[ "$(uname -m)" == "armv7l" || \
      #               "$(uname -m)" == "armv8l" ]]; then \
      #           _rust="rust-std-armv7-linux-androideabi" \
      #         fi \
      #         if [[ "${RUNNER_ARCH}" == "X64" ]]; then \
      #           _rust="rust" && \
      #           export \
      #             _rust="${_rust}" \
      #         fi \
      #         if [[ "$(uname -m)" == "i686" || \
      #               "$(uname -m)" == "aarch64" ]]; then \
      #           _rust="rust" && \
      #           export \
      #             _rust="${_rust}" \
      #         fi && \
      #     /entrypoint.sh \
      #       apt \
      #         install \
      #           -y \
      #           "rust" \
      #           "rust-std-armv7-linux-androideabi"
      - name:
          Installs Git.
        run: |
          /entrypoint.sh \
            pkg \
              install \
                -y \
                "gh" \
                "git" \
                "jq" \
                "tree" \
                "unzip"
      # - name:
      #     Installs Capnproto.
      #   run: |
      #     /entrypoint.sh \
      #       pkg \
      #         install \
      #           -y \
      #           "capnproto"
      - name:
          Installs Pacman.
        run: |
          /entrypoint.sh \
            pkg \
              install \
                -y \
                "pacman" \
                "termux-keyring" \
                "tree" \
                "tsu"
          # Init keyring
          /entrypoint.sh \
            pacman-key \
              --init
      - name:
          Installs Crash Bash Library.
        run: |
          /entrypoint.sh git \
              clone \
                --branch="libcrash-bash" \
                --single-branch \
                --depth=1 \
                "https://github.com/themartiancompany/fur" \
                "${HOME}/fur"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs Fur.
        run: |
          /entrypoint.sh \
            git \
              clone \
                --branch="fur" \
                --single-branch \
                --depth=1 \
                "https://github.com/themartiancompany/fur" \
                "${HOME}/fur" || \
            true
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Downloads latest Fur.
        run: |
          /entrypoint.sh \
            git \
              clone \
                --branch="main" \
                --single-branch \
                --depth=1 \
                "https://github.com/themartiancompany/fur" \
                "${HOME}/fur-src" || \
            true
      - name:
          Installs Python Pygments.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "python-pygments"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            tree \
              "${HOME}"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs Reallymakepkg.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "reallymakepkg"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            tree \
              "${HOME}"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs 'build essential' ahah.
        run: |
          /entrypoint.sh \
            pkg \
              install \
                -y \
                binutils \
                bsdtar \
                file \
                build-essential
      - name:
          Installs make.
        run: |
          /entrypoint.sh \
            pkg \
              install \
                -y \
                "make"
      - name:
          Installs Python Docutils.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "python-docutils"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs EVM Chains Info.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "evm-chains-info"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs EVM Chains Explorers.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "evm-chains-explorers"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs LibEVM.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "libevm"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs EVM Contracts Tools.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "evm-contracts-tools"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs EVM Wallet.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "evm-wallet"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs Key Gen.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "key-gen"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs EVMFS.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "evmfs"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs Aspe.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "lur"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs Lur.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "lur"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Installs Meson.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "meson"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
      - name:
          Setup.
        run: |
          # pkg/pip need to be prefixed with /entrypoint.sh
          # because GHA overrode the entrypoint.
          /entrypoint.sh \
            pkg \
              install \
                -y \
                "clang" \
                "jq" \
                "ninja"
          # This doesn't work
          # /entrypoint.sh \
          #   gpg \
          #     --homedir \
          #       "/data/data/com.termux/files/usr/etc/pacman.d/gnupg" \
          #     --recv-keys \
          #       "998DE27318E867EA976BA877389CEED64573DFCA"
          # One needs to manually install the
          # termux-keyring pacman package if
          # in the Termux Debian environment.
          # /entrypoint.sh \
          #   pacman \
          #     -Sy \
          #     termux-keyring
          # /entrypoint.sh \
          #   pacman-key \
          #     --init
          # /entrypoint.sh \
          #   pip \
          #     install \
          #     "meson"
      - name:
          Installs Termux Keyring.
        run: |
          /entrypoint.sh \
            fur \
              -v \
              -p \
                "pacman" \
              -d \
              "termux-keyring"
          /entrypoint.sh \
            rm \
              "${HOME}/fur/termux/any/"*".pkg.tar."*".sig"
          /entrypoint.sh \
            pacman \
              -Udd \
              --noconfirm \
              "${HOME}/fur/termux/any/"*".pkg.tar."* \
              --overwrite="*"
          /entrypoint.sh \
            rm \
              -rf \
              "${HOME}/fur"
          /entrypoint.sh \
            pacman-key \
              --init || \
            true
          /entrypoint.sh \
            pacman \
              -Sy || \
            true
      - name:
          Install docutils.
        run: |
          /entrypoint.sh \
            pip \
              install \
                "docutils"
      - name:
          Read pkgbase.
        run: |
          export \
            _pkgbase="$( \
              _evmfs="false" \
              /entrypoint.sh \
                recipe-get \
                  "PKGBUILD" \
                  "pkgbase")"
          export \
            _pkgname="$( \
              _evmfs="false" \
              /entrypoint.sh \
                recipe-get \
                  "PKGBUILD" \
                  "pkgname")"
      - name:
          Installs latest Crash Bash Library.
        run: |
          git \
            clone \
              "https://github.com/themartiancompany/crash-bash"
          cd \
            "crash-bash"
          mkdir \
            -p \
            "/usr/lib/libcrash-bash"
          make \
            PREFIX="/usr" \
            install
      - name:
          Installs latest Reallymakepkg.
        run: |
          /entrypoint.sh \
            pacman \
              -Rdd \
              --noconfirm \
              "reallymakepkg"
          /entrypoint.sh \
            git \
              clone \
                "https://github.com/themartiancompany/reallymakepkg" \
                "${HOME}/reallymakepkg-src" || \
              true
          /entrypoint.sh \
            make \
              PREFIX="/usr" \
              -C \
                "${HOME}/reallymakepkg-src" \
              install-scripts
          /entrypoint.sh \
            make \
              -C \
                "${HOME}/reallymakepkg-src" \
              install-scripts
          /entrypoint.sh \
            make \
              -C \
                "${HOME}/reallymakepkg-src" \
              install-configs || \
            true
          /entrypoint.sh \
            install \
              -vDm644 \
              "${HOME}/reallymakepkg-src/configs/makepkg.android.conf" \
              "/data/data/com.termux/files/usr/etc/reallymakepkg/makepkg.android.conf"
      - name:
          Installs latest gl-dl.
        run: |
          /entrypoint.sh \
            git \
              clone \
                --single-branch \
                --depth=1 \
                "https://github.com/themartiancompany/gl-dl" \
                "${HOME}/gl-dl-src" || \
            true
          cd \
            "${HOME}/gl-dl-src"
          /entrypoint.sh \
            make \
              PREFIX="/usr" \
              install-scripts
      - name:
          Installs latest EVM GNUPG.
        run: |
          /entrypoint.sh \
            git \
              clone \
                --single-branch \
                --depth=1 \
                "https://github.com/themartiancompany/evm-gnupg" \
                "${HOME}/evm-gnupg-src" || \
            true
          cd \
            "${HOME}/evm-gnupg-src"
          /entrypoint.sh \
            make \
              PREFIX="/usr" \
              install-scripts
      - name:
          Installs latest Gur.
        run: |
          /entrypoint.sh \
            pkg \
              install \
                -y \
                "gh"
          /entrypoint.sh \
            git \
              clone \
                --branch="master" \
                --single-branch \
                --depth=1 \
                "https://github.com/themartiancompany/gur" \
                "${HOME}/gur-src" || \
            true
          cd \
            "${HOME}/gur-src"
          /entrypoint.sh \
            make \
              PREFIX="/usr" \
              install-scripts
      - name:
          Installs latest Fur.
        run: |
          /entrypoint.sh \
            git \
              clone \
                --branch="main" \
                --single-branch \
                --depth=1 \
                "https://github.com/themartiancompany/fur" \
                "${HOME}/fur-src" || \
            true
          cd \
            "${HOME}/fur-src"
          /entrypoint.sh \
            make \
              PREFIX="/usr" \
              install-fur
      - name:
          Installs build dependencies.
        env:
          GH_TOKEN:
            ${{ secrets.GITHUB_TOKEN }}
        run: |
          _evmfs="false" \
            -v \
            recipe-get \
              -o \
                "array" \
              -d \
                " " \
              "PKGBUILD" \
              "makedepends"
          _evmfs="false" \
            recipe-get \
              -o \
                "array" \
              -d \
                " " \
              "PKGBUILD" \
              "makedepends" > \
            "${HOME}/makedepends"
          for _pkg in $(cat "${HOME}/makedepends"); do \
            _depend_name="$( \
              /entrypoint.sh \
                version-split \
                  "${_pkg}" \
                  "name")"
            SHELL="bash" \
            /entrypoint.sh \
              pacman \
                -S \
                  --noconfirm \
                  "${_depend_name}" \
                  --overwrite="*" || \
                true
          done
          for _pkg in $(cat "${HOME}/makedepends"); do \
            _depend_name="$( \
              /entrypoint.sh \
                version-split \
                  "${_pkg}" \
                  "name")"
            /entrypoint.sh \
              fur \
                -v \
                -t \
                  "ci" \
                -m \
                  "github" \
                -p \
                  "pacman" \
                "${_pkg}" || \
              true
          done
      - name:
          Builds the Android package.
        run: |
          /entrypoint.sh \
            recipe-get \
              -v \
              "PKGBUILD" \
               "pkgbase" || \
          true
          export \
            _pkgbase="$( \
              /entrypoint.sh \
                recipe-get \
                  "PKGBUILD" \
                  "pkgbase")"
          _pkgbase="$( \
            /entrypoint.sh \
              recipe-get \
                "PKGBUILD" \
                "pkgbase")" && \
          /entrypoint.sh \
            mkdir \
              -p \
              "${HOME}/${_pkgbase}-build" && \
          _arch="$( \
            uname \
              -m)" && \
          if [[ "${_arch}" == "armv8l" ]]; then \
            _arch="arm"; \
          fi && \
          /entrypoint.sh \
            _evmfs="false" \
            arch="${_arch}" \
            TERMUX_VERSION=50 \
            _git_service="github" \
            reallymakepkg \
              -v \
              -w \
                "${HOME}/${_pkgbase}-build" \
              -u \
              -- \
              -df \
              --nocheck \
              --skippgpcheck
          /entrypoint.sh \
            echo \
              "Home: ${HOME}"
