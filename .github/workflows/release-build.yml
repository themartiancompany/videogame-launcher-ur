            PREFIX="/usr" \
            install-scripts
      - name:
          Installs latest Fur.
        run: |
          git \
            clone \
              --branch="main" \
              --single-branch \
              --depth=1 \
              "https://github.com/themartiancompany/fur" \
              "${HOME}/fur-src" || \
          true
          cd \
            "${HOME}/fur-src"
          make \
            PREFIX="/usr" \
            install-fur
      - name:
          Read pkgbase.
        run: |
          export \
            _pkgbase="$( \
              _evmfs="false" \
              recipe-get \
                "PKGBUILD" \
                "pkgbase")"
          export \
            _pkgname="$( \
              _evmfs="false" \
              recipe-get \
                "PKGBUILD" \
                "pkgname")"
      - name:
          Installs build dependencies.
        env:
          GH_TOKEN:
            ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls
          _evmfs="false" \
          _git_service="github" \
          recipe-get \
            -o \
              "array" \
            -d \
              " " \
            "PKGBUILD" \
            "makedepends" > \
          "${HOME}/makedepends"
          # ( _evmfs="false" \
          #   recipe-get \
          #     -o \
          #       "array" \
          #     -d \
          #       " " \
          #     "PKGBUILD" \
          #     "makedepends" || \
          #   true ) > \
          #   "makedepends"
          export \
            _makedepends="$( \
              cat \
                "${HOME}/makedepends")"
          echo \
            "Build dependencies found: '$_makedepends'."
          for _pkg in "jq" $(cat "${HOME}/makedepends"); do \
            echo \
              "Extracting package name from '${_pkg}' with version-split."; \
            version-split \
              -v \
              "${_pkg}" \
              "name" || \
              true; \
            export \
              _depend_name="$( \
                version-split \
                  "${_pkg}" \
                  "name" || \
                true)"; \
            echo \
              "Installing '${_depend_name}' with pacman."; \
            pacman \
              -S \
                --noconfirm \
                "${_depend_name}" \
                --overwrite="*" || \
              true
          done
          for _pkg in $(cat "${HOME}/makedepends"); do \
            _depend_name="$( \
              version-split \
                "${_pkg}" \
                "name" || \
              true)"; \
            echo \
              "Installing '${_depend_name}' with fur."; \
              fur \
                -v \
                -t \
                  "ci" \
                -m \
                  "github" \
                -p \
                  "pacman" \
                "${_depend_name}" || \
              true
          done
      - name:
          Builds the Arch package.
        run: |
          _evmfs="false" \
          _git_service="github" \
          recipe-get \
            -v \
            "PKGBUILD" \
            "pkgbase"
          export \
            _pkgbase="$( \
              _evmfs="false" \
              _git_service="github" \
              recipe-get \
                "PKGBUILD" \
                "pkgbase")" && \
          su \
            -c \
              "cd ${PWD} && _evmfs="false" _git="false" _git_service="github" reallymakepkg -v -u -w '/home/user/${_pkgbase}-build' -- -df --nocheck --skippgpcheck && ls -lsh" - \
            "user"
      # - name:
      #     Installs the package.
      #   run: |
      #     pacman \
      #       -Rdd \
      #       --noconfirm \
      #       fur || \
      #       true
      #     pacman \
      #       -Rdd \
      #       --noconfirm \
      #       fur-docs || \
      #       true
      #     pacman \
      #       -Udd \
      #       --noconfirm \
      #       $(find \
      #           "${PWD}" \
      #           -iname \
      #             "*.pkg.tar.*")
      - name:
          version
        run: |
          echo \
            "::set-output name=version::$( \
            _evmfs="false" \
            recipe-get \
              "PKGBUILD" \
              "pkgver")-$( \
            _evmfs="false" \
            recipe-get \
              "PKGBUILD" \
              "pkgrel")"
        id:
          version
      - name:
          Upload Arch package.
        uses:
          actions/upload-release-asset@v1
        env:
          GH_TOKEN:
            ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url:
            ${{ github.event.release.upload_url }}
            # ${{ steps.create_release.outputs.upload_url }}
          asset_path:
            "evm-openpgp-keyserver-${{ steps.version.outputs.version }}-any.pkg.tar.xz"
          asset_name:
            "dogeos-gnu-evm-openpgp-keyserver-${{ steps.version.outputs.version }}-any.pkg.tar.xz"
          asset_content_type:
            application/gzip
