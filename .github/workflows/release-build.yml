              "${HOME}/gl-dl-src" || \
          true
          cd \
            "${HOME}/gl-dl-src"
          make \
            PREFIX="/usr" \
            install-scripts
      - name:
          Installs latest Gur.
        run: |
          git \
            clone \
              --branch="master" \
              --single-branch \
              --depth=1 \
              "https://github.com/themartiancompany/gur" \
              "${HOME}/gur-src" || \
          true
