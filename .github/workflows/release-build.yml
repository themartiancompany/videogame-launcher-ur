      - name:
          Installs Lur.
        run: |
          fur \
            -v \
            -d \
            "lur"
          rm \
            "${HOME}/fur/arch/any/"*".pkg.tar."*".sig"
          pacman \
            -Udd \
            --noconfirm \
            "${HOME}/fur/arch/any/"*".pkg.tar."*
          rm \
            -rf \
            "${HOME}/fur"
      - name:
          Installs Ur.
        run: |
          fur \
            -v \
            -d \
            "ur"
          rm \
            "${HOME}/fur/arch/any/"*".pkg.tar."*".sig"
          pacman \
            -Udd \
            --noconfirm \
            "${HOME}/fur/arch/any/"*".pkg.tar."*
          rm \
            -rf \
            "${HOME}/fur"
      - name:
          Setups an user. This is something which exists on the Ur for a reason.
        run: |
          mkdir \
            -p \
            "/home/user/lur"
          useradd \
            user
          chmod \
            700 \
            "/home/user"
          chown \
            -R \
            "user:user" \
            "/home/user"
          chown \
            -R \
            "user:user" \
            "${PWD}"
      - name:
          Installs latest Crash Bash Library.
        run: |
          git \
            clone \
              "https://github.com/themartiancompany/crash-bash"
          cd \
            "crash-bash"
          mkdir \
            -p \
            "/usr/lib/libcrash-bash"
          make \
            PREFIX="/usr" \
            install
      - name:
          Installs latest Reallymakepkg.
        run: |
          pacman \
            -Rdd \
            --noconfirm \
            "reallymakepkg"
          git \
            clone \
              --branch="main" \
              --single-branch \
              --depth=1 \
              "https://github.com/themartiancompany/reallymakepkg" \
              "${HOME}/reallymakepkg-src" || \
          true
          git \
            -C \
              "${HOME}/reallymakepkg-src" \
            log | \
            head \
              -n \
                20
          cd \
            "${HOME}/reallymakepkg-src"
          make \
            -C \
              "${HOME}/reallymakepkg-src" \
            PREFIX="/usr" \
            install-scripts
          make \
            -C \
              "${HOME}/reallymakepkg-src" \
            PREFIX="/usr" \
            install-configs || \
          true
          install \
            -vDm644 \
            "${HOME}/reallymakepkg-src/configs/makepkg.gnu.conf" \
            "/etc/reallymakepkg/makepkg.gnu.conf"
      - name:
          Installs latest EVM GNUPG.
        run: |
          git \
